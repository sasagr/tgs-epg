name: Generate TGS EPG

# Rebuilds tgs.xml from the TGS guida-tv pages on a schedule and commits it when it changes.
on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours (UTC)
  workflow_dispatch: {}
  push:
    branches: [main]
    paths: ["generate.py", ".github/workflows/epg.yml"]

permissions:
  contents: write

concurrency:
  group: epg
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate tgs.xml
        run: python generate.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain tgs.xml)" ]; then
            git add tgs.xml
            git commit -m "Update TGS EPG ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          else
            echo "tgs.xml unchanged — nothing to commit."
          fi
